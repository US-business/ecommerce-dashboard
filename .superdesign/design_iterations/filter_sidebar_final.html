<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Product Filters</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/flowbite@2.0.0/dist/flowbite.min.js"></script>
  <link rel="stylesheet" href="filter_sidebar_theme.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
</head>
<body class="font-sans">

<!-- Mobile Header -->
<header class="md:hidden fixed top-0 w-full bg-background border-b border-border p-4 flex justify-between items-center z-50"
        x-data="{ mobileOpen: false }">
  <h1 class="font-semibold">Product Filters</h1>
  <button class="p-2 rounded-lg hover:bg-accent" @click="mobileOpen = !mobileOpen">
    <i data-lucide="x" class="w-6 h-6" x-show="mobileOpen"></i>
    <i data-lucide="filter" class="w-6 h-6" x-show="!mobileOpen"></i>
  </button>
</header>

<!-- Sidebar -->
<aside class="fixed h-screen w-[var(--sidebar-width)] bg-background border-r border-border p-6 transform transition-transform duration-300 -translate-x-full md:translate-x-0"
       :class="{ 'translate-x-0': mobileOpen }">
  
  <!-- Search Header -->
  <div class="mb-8">
    <div class="relative">
      <input type="text" 
             class="w-full pl-10 pr-8 py-3 rounded-lg bg-input border border-border focus:ring-2 focus:ring-ring"
             placeholder="Search products...">
      <div class="absolute inset-y-0 left-3 flex items-center">
        <i data-lucide="search" class="w-5 h-5 text-muted-foreground"></i>
      </div>
      <button class="absolute inset-y-0 right-3 flex items-center">
        <i data-lucide="x" class="w-5 h-5 text-muted-foreground hover:text-destructive"></i>
      </button>
    </div>
  </div>

  <!-- Filters Accordion -->
  <div class="space-y-6" x-data="{ openSections: ['category', 'brand'] }">
    
    <!-- Category Filter -->
    <div class="accordion-item">
      <button @click="openSections.includes('category') ? openSections.splice(openSections.indexOf('category'), 1) : openSections.push('category')"
              class="flex justify-between items-center w-full py-2">
        <h3 class="font-medium">Category</h3>
        <i data-lucide="chevron-down" class="transform transition" :class="openSections.includes('category') ? 'rotate-180' : ''"></i>
      </button>
      <div class="mt-3 space-y-2" x-show="openSections.includes('category')" x-collapse>
        <div class="space-y-2">
          <label class="filter-item flex items-center gap-2 hover:bg-accent p-2 rounded">
            <input type="checkbox" class="w-4 h-4 rounded border-border checked:bg-primary">
            <span class="label">Electronics</span>
            <span class="count text-muted-foreground text-sm ml-auto">(128)</span>
          </label>
          <label class="filter-item flex items-center gap-2 hover:bg-accent p-2 rounded">
            <input type="checkbox" class="w-4 h-4 rounded border-border checked:bg-primary">
            <span class="label">Apparel</span>
            <span class="count text-muted-foreground text-sm ml-auto">(342)</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Brand Filter -->
    <div class="accordion-item">
      <button @click="openSections.includes('brand') ? openSections.splice(openSections.indexOf('brand'), 1) : openSections.push('brand')"
              class="flex justify-between items-center w-full py-2">
        <h3 class="font-medium">Brand</h3>
        <i data-lucide="chevron-down" class="transform transition" :class="openSections.includes('brand') ? 'rotate-180' : ''"></i>
      </button>
      <div class="mt-3 space-y-2" x-show="openSections.includes('brand')" x-collapse>
        <div class="space-y-2">
          <label class="filter-item flex items-center gap-2 hover:bg-accent p-2 rounded">
            <input type="checkbox" class="w-4 h-4 rounded border-border checked:bg-primary">
            <span class="label">Nike</span>
            <span class="count text-muted-foreground text-sm ml-auto">(234)</span>
          </label>
          <label class="filter-item flex items-center gap-2 hover:bg-accent p-2 rounded">
            <input type="checkbox" class="w-4 h-4 rounded border-border checked:bg-primary">
            <span class="label">Adidas</span>
            <span class="count text-muted-foreground text-sm ml-auto">(189)</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Price Range -->
    <div class="accordion-item">
      <div class="mt-4">
        <label class="block text-sm font-medium mb-2">Price Range</label>
        <div class="relative pt-4">
          <input type="range" 
                 class="w-full range-slider appearance-none h-2 bg-input rounded-lg"
                 min="0" 
                 max="1000">
          <div class="flex justify-between text-sm text-muted-foreground mt-2">
            <span>$0</span>
            <span>$1000</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Rating Filter -->
    <div class="accordion-item">
      <button @click="openSections.includes('rating') ? openSections.splice(openSections.indexOf('rating'), 1) : openSections.push('rating')"
              class="flex justify-between items-center w-full py-2">
        <h3 class="font-medium">Rating</h3>
        <i data-lucide="chevron-down" class="transform transition" :class="openSections.includes('rating') ? 'rotate-180' : ''"></i>
      </button>
      <div class="mt-3 space-y-2" x-show="openSections.includes('rating')" x-collapse>
        <template x-for="index in 5">
          <div class="rating-option flex items-center gap-2 cursor-pointer hover:bg-accent p-2 rounded"
               @click="selectedRating = (selectedRating === index) ? 0 : index"
               x-data="{ selectedRating: 0 }">
            <div class="stars flex">
              <template x-for="i in 5">
                <i data-lucide="star" 
                   class="w-4 h-4" 
                   :class="i <= index ? 'fill-primary stroke-primary' : 'fill-muted stroke-muted'"></i>
              </template>
            </div>
            <span class="text-sm text-muted-foreground">& Up</span>
            <span class="text-sm ml-auto">(1.2k)</span>
          </div>
        </template>
      </div>
    </div>

    <!-- Advanced Filters -->
    <div class="pt-4 border-t border-border">
      <div class="space-y-4">
        <div class="relative">
          <label class="block text-sm font-medium mb-2">Sort By</label>
          <select class="w-full pl-3 pr-8 py-2 rounded-lg bg-input border border-border appearance-none">
            <option>Newest Arrivals</option>
            <option>Price: Low to High</option>
            <option>Price: High to Low</option>
            <option>Best Selling</option>
          </select>
          <i data-lucide="chevron-down" class="absolute right-3 top-9 w-4 h-4 text-muted-foreground"></i>
        </div>
        
        <div class="space-y-2">
          <label class="flex items-center gap-2 hover:bg-accent p-2 rounded">
            <input type="checkbox" class="w-4 h-4 rounded border-border checked:bg-primary">
            <span class="text-sm">In Stock Only</span>
          </label>
          <label class="flex items-center gap-2 hover:bg-accent p-2 rounded">
            <input type="checkbox" class="w-4 h-4 rounded border-border checked:bg-primary">
            <span class="text-sm">On Sale Items</span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer Actions -->
  <div class="absolute bottom-0 left-0 right-0 p-6 border-t border-border bg-background">
    <div class="grid gap-3">
      <button class="w-full py-2 px-4 rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 transition-colors">
        Apply Filters
      </button>
      <button class="w-full py-2 px-4 rounded-lg border border-border hover:bg-accent transition-colors">
        Clear All
      </button>
    </div>
  </div>
</aside>

<script>
  lucide.createIcons();
</script>
</body>
</html>
